<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Telegram Channel Sender</title>
  <style>
    body {
      margin: 0;
      font-family: sans-serif;
      background: #f5f5f5;
      color: #111;
    }
    .container {
      max-width: 520px;
      margin: 48px auto;
      background: #fff;
      border: 1px solid #ddd;
      border-radius: 8px;
      padding: 20px;
    }
    h1 {
      margin: 0 0 16px;
      font-size: 22px;
    }
    label {
      display: block;
      margin-bottom: 6px;
      font-weight: 600;
    }
    input, textarea, button {
      width: 100%;
      box-sizing: border-box;
      margin-bottom: 14px;
      padding: 10px;
      font-size: 14px;
      border: 1px solid #ccc;
      border-radius: 6px;
    }
    textarea {
      min-height: 140px;
      resize: vertical;
    }
    button {
      cursor: pointer;
      background: #111;
      color: #fff;
      border: none;
      font-weight: 600;
    }
    #result {
      margin-top: 8px;
      padding: 10px;
      border-radius: 6px;
      display: none;
      white-space: pre-wrap;
      word-break: break-word;
    }
    #result.ok {
      background: #e8f7ee;
      color: #0f6b35;
      border: 1px solid #b6e4c8;
    }
    #result.error {
      background: #fdecec;
      color: #8e2323;
      border: 1px solid #f6caca;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Send Message to Telegram Channel</h1>
    <form id="send-form">
      <label for="channel_name">Channel Name</label>
      <input id="channel_name" name="channel_name" required>

      <label for="channel_secret">Channel Secret</label>
      <input id="channel_secret" name="channel_secret" required>

      <label for="message">Message</label>
      <textarea id="message" name="message" required></textarea>

      <button type="submit">Send Message</button>
    </form>
    <div id="result"></div>
  </div>

  <script>
    const API_KEY = {{ api_key | tojson }};
    const form = document.getElementById("send-form");
    const result = document.getElementById("result");

    function showResult(ok, text) {
      result.style.display = "block";
      result.className = ok ? "ok" : "error";
      result.textContent = text;
    }

    form.addEventListener("submit", async (event) => {
      event.preventDefault();

      const payload = {
        channel_name: document.getElementById("channel_name").value.trim(),
        channel_secret: document.getElementById("channel_secret").value.trim(),
        message: document.getElementById("message").value.trim()
      };

      if (!payload.channel_name || !payload.channel_secret || !payload.message) {
        showResult(false, "All fields are required.");
        return;
      }

      showResult(true, "Sending...");

      try {
        const response = await fetch("/api/broadcast-to-channel", {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
            "X-API-Key": API_KEY
          },
          body: JSON.stringify(payload)
        });

        const data = await response.json();
        if (!response.ok) {
          showResult(false, data.error || "Failed to send message.");
          return;
        }

        showResult(true, "Message sent.\nSent to: " + data.sent_to + "\nFailed: " + data.failed);
      } catch (error) {
        showResult(false, "Request failed: " + error.message);
      }
    });
  </script>
</body>
</html>
