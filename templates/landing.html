<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Telegram Channel Sender</title>
  <style>
    :root {
      --tg-blue: #229ed9;
      --tg-blue-dark: #1d8ec2;
      --tg-bg: #eaf4fb;
      --tg-border: #cfe6f4;
      --tg-text: #1f2d3d;
    }
    body {
      margin: 0;
      font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(180deg, #dff1ff 0%, #eef7ff 100%);
      color: var(--tg-text);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 16px;
    }
    .container {
      max-width: 520px;
      width: 100%;
      background: #fff;
      border: 1px solid var(--tg-border);
      border-radius: 16px;
      padding: 24px;
      box-shadow: 0 14px 35px rgba(34, 158, 217, 0.18);
    }
    h1 {
      margin: 0 0 6px;
      font-size: 24px;
      text-align: center;
      line-height: 1.25;
      color: #106b9f;
    }
    .subtitle {
      margin: 0 0 22px;
      font-size: 13px;
      text-align: center;
      color: #4d6f84;
      letter-spacing: 0.02em;
    }
    label {
      display: block;
      margin-bottom: 6px;
      font-weight: 600;
      color: #285368;
    }
    input, textarea, button {
      width: 100%;
      box-sizing: border-box;
      margin-bottom: 14px;
      padding: 11px 12px;
      font-size: 14px;
      border: 1px solid var(--tg-border);
      border-radius: 10px;
    }
    input:focus, textarea:focus {
      outline: none;
      border-color: var(--tg-blue);
      box-shadow: 0 0 0 3px rgba(34, 158, 217, 0.17);
    }
    textarea {
      min-height: 140px;
      resize: vertical;
    }
    button {
      cursor: pointer;
      background: var(--tg-blue);
      color: #fff;
      border: none;
      font-weight: 600;
      transition: background 0.15s ease;
    }
    button:hover {
      background: var(--tg-blue-dark);
    }
    #result {
      margin-top: 8px;
      padding: 12px;
      border-radius: 10px;
      display: none;
      white-space: pre-wrap;
      word-break: break-word;
    }
    #result.ok {
      background: var(--tg-bg);
      color: #0b5f8e;
      border: 1px solid var(--tg-border);
    }
    #result.error {
      background: #fff1f1;
      color: #8e2323;
      border: 1px solid #f7d1d1;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Send Message to Telegram Channel</h1>
    <p class="subtitle">Simple Telegram-style sender</p>
    <form id="send-form">
      <label for="channel_name">Channel Name</label>
      <input id="channel_name" name="channel_name" required>

      <label for="channel_secret">Channel Secret</label>
      <input id="channel_secret" name="channel_secret" required>

      <label for="message">Message</label>
      <textarea id="message" name="message" required></textarea>

      <button type="submit">Send Message</button>
    </form>
    <div id="result"></div>
  </div>

  <script>
    const form = document.getElementById("send-form");
    const result = document.getElementById("result");

    function showResult(ok, text) {
      result.style.display = "block";
      result.className = ok ? "ok" : "error";
      result.textContent = text;
    }

    form.addEventListener("submit", async (event) => {
      event.preventDefault();

      const payload = {
        channel_name: document.getElementById("channel_name").value.trim(),
        channel_secret: document.getElementById("channel_secret").value.trim(),
        message: document.getElementById("message").value.trim()
      };

      if (!payload.channel_name || !payload.channel_secret || !payload.message) {
        showResult(false, "All fields are required.");
        return;
      }

      showResult(true, "Sending...");

      try {
        const response = await fetch("/web/broadcast-to-channel", {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify(payload)
        });

        const data = await response.json();
        if (!response.ok) {
          showResult(false, data.error || "Failed to send message.");
          return;
        }

        showResult(true, "Message sent.\nSent to: " + data.sent_to + "\nFailed: " + data.failed);
      } catch (error) {
        showResult(false, "Request failed: " + error.message);
      }
    });
  </script>
</body>
</html>
